<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Miner — Promo Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; padding:20px; max-width:800px; margin:0 auto; }
h1 { text-align:center; margin-bottom:24px; font-size:1.4rem; }
h1 span { color:#10b981; }

.card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:20px; margin-bottom:16px; }
.card h2 { font-size:1rem; margin-bottom:14px; color:#a78bfa; }

label { display:block; font-size:0.8rem; color:#888; margin-bottom:4px; margin-top:12px; }
input, select { width:100%; padding:10px 12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; color:#fff; font-size:0.9rem; outline:none; }
input:focus, select:focus { border-color:#a78bfa; }
select option { background:#1a1a2e; color:#fff; }

.row { display:flex; gap:12px; }
.row > div { flex:1; }

button { width:100%; padding:12px; border:none; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; margin-top:16px; transition:0.2s; }
.btn-create { background:linear-gradient(135deg,#a78bfa,#7c3aed); color:#fff; }
.btn-create:hover { transform:scale(1.02); }
.btn-delete { background:rgba(239,68,68,0.2); color:#ef4444; border:1px solid rgba(239,68,68,0.3); font-size:0.8rem; padding:6px 12px; width:auto; margin:0; }

.promo-list { margin-top:16px; }
.promo-item { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:14px; margin-bottom:10px; }
.promo-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.promo-code { font-family:monospace; font-size:1.1rem; font-weight:700; color:#10b981; }
.promo-meta { font-size:0.75rem; color:#888; }
.promo-meta span { margin-right:12px; }
.promo-bar { height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin-top:6px; overflow:hidden; }
.promo-bar-fill { height:100%; background:linear-gradient(90deg,#10b981,#059669); border-radius:2px; transition:0.3s; }

.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.7rem; font-weight:600; }
.badge-ton { background:rgba(16,185,129,0.15); color:#10b981; }
.badge-machine { background:rgba(59,130,246,0.15); color:#3b82f6; }
.badge-spin { background:rgba(245,158,11,0.15); color:#f59e0b; }
.badge-expired { background:rgba(239,68,68,0.15); color:#ef4444; }
.badge-active { background:rgba(16,185,129,0.15); color:#10b981; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#10b981; color:#fff; padding:10px 20px; border-radius:8px; font-size:0.85rem; display:none; z-index:999; }
.toast.error { background:#ef4444; }

.login-box { text-align:center; margin-top:100px; }
.login-box input { max-width:300px; margin:0 auto; display:block; }
.login-box button { max-width:300px; margin:12px auto 0; }

#machineSelect { display:none; }
#amountField { display:block; }
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
    <h1>🔐 Admin Login</h1>
    <label>Admin Key</label>
    <input type="password" id="adminKeyInput" placeholder="Enter admin key...">
    <button class="btn-create" onclick="doLogin()">Login</button>
</div>

<div id="mainScreen" style="display:none;">
    <h1>🎁 <span>Promo</span> Manager</h1>

    <!-- CREATE PROMO -->
    <div class="card">
        <h2>➕ Create Promo Code</h2>

        <label>Promo Code</label>
        <input type="text" id="promoCode" placeholder="e.g. TONVIP50" style="text-transform:uppercase;">

        <label>Reward Type</label>
        <select id="rewardType" onchange="toggleRewardFields()">
            <option value="ton">💰 TON Balance</option>
            <option value="machine">⚙️ Free Machine</option>
            <option value="spin">🎡 Free Spin</option>
        </select>

        <div id="amountField">
            <label>TON Amount</label>
            <input type="number" id="rewardAmount" placeholder="0.50" step="0.01" min="0.01">
        </div>

        <div id="machineSelect">
            <label>Machine</label>
            <select id="machineId">
                <option value="1">Nano Chip (3 GH/s — 5 TON)</option>
                <option value="2">Micro Core (7 GH/s — 15 TON)</option>
                <option value="3">Basic Miner (16 GH/s — 35 TON)</option>
                <option value="4">Dual Processor (35 GH/s — 75 TON)</option>
                <option value="5">Quad Engine (69 GH/s — 150 TON)</option>
                <option value="6">Hexa Unit (139 GH/s — 300 TON)</option>
                <option value="7">Quantum Node (278 GH/s — 600 TON)</option>
                <option value="8">Fusion Reactor (556 GH/s — 1200 TON)</option>
                <option value="9">Dark Matter (1157 GH/s — 2500 TON)</option>
                <option value="10">Plasma Core (2315 GH/s — 5000 TON)</option>
            </select>
        </div>

        <div class="row">
            <div>
                <label>Max Uses</label>
                <input type="number" id="maxUses" value="100" min="1">
            </div>
            <div id="expiresField">
                <label>Expires In (hours, 0=never)</label>
                <input type="number" id="expiresIn" value="0" min="0">
            </div>
            <div id="machineDurationField" style="display:none;">
                <label>Machine Duration (minutes)</label>
                <input type="number" id="machineDuration" value="30" min="1" placeholder="30">
            </div>
        </div>

        <button class="btn-create" onclick="createPromo()">🚀 Create Promo</button>
    </div>

    <!-- PROMO LIST -->
    <div class="card">
        <h2>📋 Active Promos</h2>
        <div id="promoList" class="promo-list">
            <div style="text-align:center; color:#666; padding:20px;">Loading...</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ADMIN_KEY = '';
const API = '/api/promo';

function doLogin() {
    ADMIN_KEY = document.getElementById('adminKeyInput').value.trim();
    if (!ADMIN_KEY) return showToast('Enter admin key', true);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    loadPromos();
}

function toggleRewardFields() {
    const type = document.getElementById('rewardType').value;
    document.getElementById('amountField').style.display = type === 'ton' ? 'block' : 'none';
    document.getElementById('machineSelect').style.display = type === 'machine' ? 'block' : 'none';
    document.getElementById('machineDurationField').style.display = type === 'machine' ? 'block' : 'none';
    document.getElementById('expiresField').style.display = type === 'machine' ? 'none' : 'block';
}

async function createPromo() {
    const code = document.getElementById('promoCode').value.trim().toUpperCase();
    const rewardType = document.getElementById('rewardType').value;
    const maxUses = parseInt(document.getElementById('maxUses').value) || 100;
    const expiresIn = parseInt(document.getElementById('expiresIn').value) || 0;

    let rewardAmount, machineDuration = 0;
    if (rewardType === 'ton') {
        rewardAmount = parseFloat(document.getElementById('rewardAmount').value);
        if (!rewardAmount || rewardAmount <= 0) return showToast('Enter TON amount', true);
    } else if (rewardType === 'machine') {
        rewardAmount = parseInt(document.getElementById('machineId').value);
        machineDuration = parseInt(document.getElementById('machineDuration').value) || 30;
        if (machineDuration < 1) return showToast('Duration must be at least 1 minute', true);
    } else {
        rewardAmount = 1; // spin
    }

    if (!code || code.length < 3) return showToast('Code must be 3+ characters', true);

    try {
        const res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'create', code, rewardType, rewardAmount, maxUses, expiresIn, machineDuration, adminKey: ADMIN_KEY })
        });
        const data = await res.json();

        if (data.success) {
            showToast('✅ ' + code + ' created!');
            document.getElementById('promoCode').value = '';
            loadPromos();
        } else {
            showToast('❌ ' + data.error, true);
        }
    } catch (e) {
        showToast('❌ ' + e.message, true);
    }
}

async function loadPromos() {
    try {
        const res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'list', adminKey: ADMIN_KEY })
        });
        const data = await res.json();

        if (!data.success) {
            document.getElementById('promoList').innerHTML = '<div style="color:#ef4444; text-align:center;">❌ ' + data.error + '</div>';
            return;
        }

        if (data.promos.length === 0) {
            document.getElementById('promoList').innerHTML = '<div style="text-align:center; color:#666; padding:20px;">No promos yet. Create one above!</div>';
            return;
        }

        const machineNames = { 1:'Nano Chip', 2:'Micro Core', 3:'Basic Miner', 4:'Dual Processor', 5:'Quad Engine', 6:'Hexa Unit', 7:'Quantum Node', 8:'Fusion Reactor', 9:'Dark Matter', 10:'Plasma Core' };

        let html = '';
        data.promos.forEach(p => {
            const isExpired = p.expiresAt && Date.now() > p.expiresAt;
            const isFull = p.usedCount >= p.maxUses;
            const pct = Math.min(100, (p.usedCount / p.maxUses) * 100);

            let rewardLabel, badgeClass;
            if (p.rewardType === 'ton') { rewardLabel = p.rewardAmount + ' TON'; badgeClass = 'badge-ton'; }
            else if (p.rewardType === 'machine') { rewardLabel = (machineNames[p.rewardAmount] || 'Machine #' + p.rewardAmount) + ' (' + (p.machineDuration || 30) + ' min)'; badgeClass = 'badge-machine'; }
            else { rewardLabel = 'Free Spin'; badgeClass = 'badge-spin'; }

            const statusBadge = isExpired ? '<span class="badge badge-expired">EXPIRED</span>' :
                               isFull ? '<span class="badge badge-expired">FULL</span>' :
                               '<span class="badge badge-active">ACTIVE</span>';

            const expireText = p.expiresAt ? new Date(p.expiresAt).toLocaleString('tr-TR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : 'Never';

            html += `
            <div class="promo-item">
                <div class="promo-header">
                    <div>
                        <span class="promo-code">${p.code}</span>
                        <span class="badge ${badgeClass}" style="margin-left:8px;">${rewardLabel}</span>
                        ${statusBadge}
                    </div>
                    <button class="btn-delete" onclick="deletePromo('${p.code}')">🗑️</button>
                </div>
                <div class="promo-meta">
                    <span>👥 ${p.usedCount}/${p.maxUses} used</span>
                    <span>⏰ ${expireText}</span>
                </div>
                <div class="promo-bar"><div class="promo-bar-fill" style="width:${pct}%"></div></div>
            </div>`;
        });

        document.getElementById('promoList').innerHTML = html;
    } catch (e) {
        document.getElementById('promoList').innerHTML = '<div style="color:#ef4444;">Error: ' + e.message + '</div>';
    }
}

async function deletePromo(code) {
    if (!confirm('Delete promo: ' + code + '?')) return;
    try {
        const res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'delete', code, adminKey: ADMIN_KEY })
        });
        const data = await res.json();
        if (data.success) { showToast('Deleted'); loadPromos(); }
        else showToast('❌ ' + data.error, true);
    } catch (e) { showToast('❌ ' + e.message, true); }
}

function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
